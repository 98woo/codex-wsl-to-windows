name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Compile legacy bridge
        run: python -m py_compile tools/codex_session_path_bridge_all_win.py

      - name: Compile safe bridge
        run: python -m py_compile tools/codex_session_path_bridge_all_win_safe.py

      - name: Compile guarded bridge
        run: python -m py_compile tools/codex_session_path_bridge_all_win_guarded.py

      - name: Test
        run: python -m pytest
